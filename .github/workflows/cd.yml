name: CD - Deploy Frontend

on:
  workflow_run:
    workflows: ["CI"] # CI workflow name (정확히 일치해야 함)
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    # 조건:
    # 1) CI 성공
    # 2) PR 이벤트
    # 3) PR 대상 브랜치가 main
    if: >
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.pull_requests != null
      && github.event.workflow_run.pull_requests[0].base.ref == 'main'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0

      - name: Install dependencies
        run: npm ci

      - name: Build & Export
        env:
          NEXT_PUBLIC_API_BASE_URL: https://urr.guru
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::022232268286:role/github-actions-frontend-role
          aws-region: ap-northeast-2

      - name: Upload to S3
        run: |
          aws s3 sync out/ s3://urr-dev-frontend --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E1SRBN3FALYH49 \
            --paths "/*"
